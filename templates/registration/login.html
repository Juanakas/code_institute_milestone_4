{% extends 'base.html' %}

{% block title %}Login | Bachata Club{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <h1 class="h3 mb-3">Member Login</h1>
        <form method="post" class="card card-body">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary">Login</button>
        </form>
        <p class="mt-3">No account yet? <a href="{% url 'signup' %}">Sign up</a>.</p>
    </div>
</div>
{% endblock %}
