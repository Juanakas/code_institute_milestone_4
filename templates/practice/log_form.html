{% extends 'base.html' %}

{% block title %}{% if is_edit %}Edit{% else %}New{% endif %} Practice Log | Bachata Club{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <h1 class="h3 mb-3">{% if is_edit %}Edit{% else %}New{% endif %} Practice Log</h1>
        <form method="post" class="card card-body">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="d-flex gap-2">
                <button class="btn btn-primary" type="submit">Save</button>
                <a class="btn btn-outline-secondary" href="{% url 'practice:list' %}">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
